name: OMEGA-QUANT Serverless Trading Pass

on:
  push:
    branches: [ master, main ]
  schedule:
    - cron: '*/5 * * * *' # Every 5 minutes
  workflow_dispatch: # Allow manual triggers

jobs:
  trade:
    runs-on: ubuntu-latest
    environment: .env
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r omega_quant/requirements.txt
        pip install python-dotenv xgboost
        
    - name: Execute Autonomous Trade Pass
      env:
        BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
        BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
        DRY_RUN: ${{ vars.DRY_RUN || 'False' }}
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python -m omega_quant.main trade-once
        
    - name: Archive Serverless Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: execution-logs
        path: omega_quant/data/*.json*
